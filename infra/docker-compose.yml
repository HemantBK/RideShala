# RideShala Development Environment
# Usage: cd infra && docker compose up -d
# All services run locally for development

version: "3.9"

services:
  # ─── Backend API ──────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - APP_PORT=8080
      - DATABASE_URL=postgresql://rideshala:rideshala@postgres:5432/rideshala
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=rideshala_dev_key
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_API_KEY=dev_key
      - VLLM_MODEL=mistralai/Mistral-7B-Instruct-v0.3
      - EMBEDDING_BASE_URL=http://vllm-embed:8001/v1
      - EMBEDDING_MODEL=nomic-ai/nomic-embed-text-v1.5
      # [OPTIONAL-PAID] Uncomment if you want Claude/Groq enhancement
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # - CLAUDE_MODEL=claude-sonnet-4-20250514
      # - GROQ_API_KEY=${GROQ_API_KEY:-}
      # - GROQ_MODEL=llama-3.1-70b-versatile
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=http://localhost:3000
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    volumes:
      - ../services/api:/app/services/api
      - ../packages:/app/packages
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rideshala
      POSTGRES_USER: rideshala
      POSTGRES_PASSWORD: rideshala
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rideshala"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Qdrant Vector Database ──────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Meilisearch ─────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: rideshala_dev_key
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    restart: unless-stopped

  # ─── vLLM (Chat LLM) ────────────────────────────────
  # Requires NVIDIA GPU. Only starts with: docker compose --profile gpu up
  vllm:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model mistralai/Mistral-7B-Instruct-v0.3
      --quantization awq
      --enable-prefix-caching
      --gpu-memory-utilization 0.85
      --max-model-len 8192
      --api-key dev_key
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    profiles:
      - gpu

  # ─── vLLM (Embeddings) ──────────────────────────────
  vllm-embed:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model nomic-ai/nomic-embed-text-v1.5
      --task embedding
      --host 0.0.0.0
      --port 8001
    ports:
      - "8001:8001"
    restart: unless-stopped
    profiles:
      - gpu

  # ─── Grafana (Monitoring) ────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    profiles:
      - monitoring

  # ─── Prometheus (Metrics) ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  pgdata:
  qdrant_data:
  redis_data:
  meili_data:
  grafana_data:
  prometheus_data:
